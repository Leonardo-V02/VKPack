#EyPipes Common Configuration
[common]

	#Crop Growth Settings
	[common.crop]
		#Chance for the crop to grow each random tick (0.0 - 1.0)
		# Default: 0.25
		# Range: 0.0 ~ 1.0
		growthChance = 0.25
		#Maximum age/growth stage of the crop
		# Default: 7
		# Range: 1 ~ 15
		maxAge = 7
		#Age at which the upper part of the crop can start growing
		# Default: 4
		# Range: 0 ~ 7
		growUpperAge = 4
		#Whether the crop requires a support block below
		requiresSupport = true

	#Drying Rack Settings
	[common.dryingRack]
		#Time in ticks to dry erbapipa into erbapipa_dried (20 ticks = 1 second)
		# Default: 4000
		# Range: 100 ~ 72000
		dryingTimeTicks = 4000
		#Maximum number of items the drying rack can hold
		# Default: 3
		# Range: 1 ~ 9
		maxItems = 3
		#Whether the drying rack requires direct sunlight to work
		requiresSunlight = false

	#Loot Drop Settings
	[common.loot]
		#Number of rolls for erbapipa drops
		# Default: 0.8
		# Range: 0.0 ~ 10.0
		erbapipaDropRolls = 0.8
		#Bonus rolls for seed drops
		# Default: 0.245
		# Range: 0.0 ~ 10.0
		seedsBonusRolls = 0.245
		#Fortune enchantment probability multiplier for seeds
		# Default: 0.06
		# Range: 0.0 ~ 1.0
		seedsFortuneProbability = 0.06
		#Whether Fortune enchantment affects crop drops
		fortuneAffectsDrops = true
		#Percentage chance for erbapipa to drop (0-100)
		# Default: 100.0
		# Range: 0.0 ~ 100.0
		erbapipaDropPercentage = 100.0
		#Percentage chance for seeds to drop (0-100)
		# Default: 35.0
		# Range: 0.0 ~ 100.0
		seedsDropPercentage = 35.0

	#Composting Settings
	[common.compost]
		#Composting chance for erbapipa seeds (0.0 - 1.0)
		# Default: 0.3
		# Range: 0.0 ~ 1.0
		erbapipaSeedsCompostChance = 0.3
		#Composting chance for erbapipa (0.0 - 1.0)
		# Default: 0.65
		# Range: 0.0 ~ 1.0
		erbapipaCompostChance = 0.65

	#Gameplay Settings
	[common.gameplay]
		#Enable the tall (2-block) crop mechanics
		enableTallCropMechanics = true
		#Breaking the upper part of the crop breaks the lower part
		breakingUpperBreaksLower = true
		#Fertilizer (bonemeal) effectiveness multiplier
		# Default: 1.0
		# Range: 0.0 ~ 10.0
		fertilizerEffectiveness = 1.0

	#Performance Settings
	[common.performance]
		#Tick rate multiplier for mod mechanics
		# Default: 1.0
		# Range: 0.1 ~ 10.0
		tickRateMultiplier = 1.0
		#Maximum drying racks allowed per chunk (performance limit)
		# Default: 64
		# Range: 1 ~ 256
		maxDryingRacksPerChunk = 64

	#Mod Integration Settings
	[common.integration]
		#Enable JEI integration for recipe viewing
		jeiIntegration = true

	#Debug Settings
	[common.debug]
		#Enable debug logging for troubleshooting
		enableDebugLogging = false
		#Show particles when crops grow
		showGrowthParticles = false
