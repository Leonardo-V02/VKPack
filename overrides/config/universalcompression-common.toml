	excluded_mods = []
	#Fully qualified block IDs to exclude (e.g. 'minecraft:tnt', 'create:copper_casing')
	excluded_blocks = []
	#Enable/disable the exact-namespace blacklist entirely.
	enable_ns_exact = true
	#Namespaces (mod IDs) to blacklist by exact match.  Edit this list to add/remove whole mods without recompiling.
	blacklist_namespaces_exact = ["chipped", "allthecompressed", "path", "productivetrees", "xtones_reworked", "xtonesreworked", "domum_ornamentum", "domumornamentum", "modern_industrialization", "aether", "immersiveengineering", "immersive_engineering", "occultism", "luminax", "create", "createaddition", "extended_industrialization", "rftoolsbuilder", "rftoolsbase", "corail_tombstone", "antibuilt", "eternal_starlight", "xnet", "bellsandwhistles", "xycraftworld", "xycraft_world", "troolvidr", "soundmuffler", "ars_nouveau", "regions_unexplored", "herbsandharvest", "biomeswevegone", "xycraft_override", "twilightforest", "merrymaking", "mysticalagriculture", "mysticalagradditions", "ae2", "compact_machines", "compactmachines", "forbidden_arcanus", "refurbished_furniture", "mrcrayfish", "quarryplus", "utilitarian", "supplementaries", "mamas_merrymaking", "nightfall", "factoryblocks", "mininggadgets", "mining_gadgets", "stevescarts", "structurize"]
	#Enable/disable the namespace-contains blacklist entirely.
